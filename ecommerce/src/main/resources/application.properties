# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=FlipkartClone

# H2 Database (Development)
spring.datasource.url=jdbc:h2:mem:flipkartdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=flipkartCloneSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# SpringDoc/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.flipkart=DEBUG
logging.level.org.springframework.security=INFO

# Thymeleaf
spring.thymeleaf.cache=false

